services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

  app:
    build:
      context: .
      target: runner
    container_name: s-tier
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
      - GRID_API_KEY=${GRID_API_KEY}
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
      - GRID_API_KEY=${GRID_API_KEY}
    restart: unless-stopped

volumes:
  redis-data:
